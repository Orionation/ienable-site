<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Muse's Report Card</title>
<style>
  :root {
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
    --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
    --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
    --green-50: #f0fdf4; --green-100: #dcfce7; --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d;
    --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-500: #3b82f6; --blue-600: #2563eb;
    --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-600: #d97706;
    --red-50: #fef2f2; --red-100: #fee2e2; --red-500: #ef4444; --red-600: #dc2626;
    --purple-50: #faf5ff; --purple-500: #8b5cf6; --purple-600: #7c3aed;
    --pink-50: #fdf2f8; --pink-500: #ec4899; --pink-600: #db2777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 20px 16px 12px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-date {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
  }

  .header-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    margin-top: 2px;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  /* Swipe container */
  .cards-container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    gap: 12px;
    scrollbar-width: none;
  }

  .cards-container::-webkit-scrollbar { display: none; }

  /* Dots indicator */
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px 0 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-300);
    transition: all 0.2s ease;
  }

  .dot.active {
    background: var(--gray-800);
    width: 20px;
    border-radius: 4px;
  }

  /* Agent Card */
  .agent-card {
    flex: 0 0 calc(100vw - 40px);
    max-width: 400px;
    scroll-snap-align: center;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .agent-header {
    padding: 20px;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .agent-header::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .agent-emoji {
    font-size: 36px;
    margin-bottom: 8px;
  }

  .agent-name {
    font-size: 20px;
    font-weight: 800;
  }

  .agent-role {
    font-size: 12px;
    opacity: 0.8;
    font-weight: 500;
  }

  .agent-grade {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* Stats row */
  .agent-stats {
    display: flex;
    padding: 12px 20px;
    gap: 8px;
    border-bottom: 1px solid var(--gray-100);
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--gray-800);
  }

  .stat-label {
    font-size: 10px;
    color: var(--gray-400);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* Accomplishments */
  .agent-body {
    padding: 16px 20px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .accomplishment {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: flex-start;
  }

  .accomplishment:last-child { margin-bottom: 0; }

  .acc-icon {
    font-size: 14px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .acc-text {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.5;
  }

  .acc-text strong {
    color: var(--gray-800);
  }

  /* Key finding callout */
  .key-finding {
    background: var(--green-50);
    border: 1px solid var(--green-100);
    border-radius: 12px;
    padding: 12px;
    margin-top: 12px;
  }

  .key-finding.warning {
    background: var(--amber-50);
    border-color: var(--amber-100);
  }

  .key-finding.info {
    background: var(--blue-50);
    border-color: var(--blue-100);
  }

  .key-finding-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--green-600);
    margin-bottom: 4px;
  }

  .key-finding.warning .key-finding-label {
    color: var(--amber-600);
  }

  .key-finding.info .key-finding-label {
    color: var(--blue-600);
  }

  .key-finding-text {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.5;
  }

  /* Bottom status */
  .agent-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .status-text {
    font-size: 12px;
    color: var(--gray-500);
  }
  /* Todo Accordion */
  .todo-accordion {
    margin: 0 16px 12px;
    border-radius: 12px;
    border: 1.5px solid var(--gray-200);
    overflow: hidden;
  }
  .todo-accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .todo-accordion-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-800);
  }
  .todo-accordion-arrow {
    font-size: 12px;
    color: var(--gray-500);
    transition: transform 0.2s;
  }
  .todo-accordion-body {
    padding: 0 12px 12px;
    background: white;
  }
  .todo-group-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-500);
    padding: 12px 4px 6px;
  }
  .todo-item {
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .todo-item.working {
    background: #f0fdf4;
    border-left: 3px solid var(--green-500);
  }
  .todo-item.queued {
    background: var(--gray-50);
    border-left: 3px solid var(--gray-300);
  }
  .todo-item.complete {
    background: var(--gray-50);
    opacity: 0.7;
  }
  .todo-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-800);
    line-height: 1.3;
  }
  .todo-item.complete .todo-item-name {
    color: var(--gray-400);
  }
  .todo-item-detail {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 2px;
    line-height: 1.3;
  }
  .todo-item-result {
    font-size: 11px;
    color: var(--green-600);
    font-style: italic;
    margin-top: 3px;
  }
  .todo-summary {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-400);
    padding: 10px 0 4px;
  }
  .todo-loading {
    text-align: center;
    padding: 16px;
    color: var(--gray-400);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-date">SATURDAY, FEBRUARY 28, 2026</div>
  <div class="header-title">Muse's Report Card</div>
  <div class="header-subtitle">🎨 Creative Director · Plank+Beam</div>
</div>

<div class="dots" id="dots"></div>

<div class="cards-container" id="cards"></div>

<script>
const cards = [
  // Production Output
  {
    name: 'Production Output',
    emoji: '🎬',
    role: 'Videos & Creative',
    color: 'linear-gradient(135deg, #ec4899, #f43f5e)',
    grade: '47',
    gradeColor: '#22c55e',
    stats: [
      { value: '4', label: 'Videos' },
      { value: '8', label: 'Raw Clips' },
      { value: '8', label: 'FLUX Images' },
    ],
    accomplishments: [
      { icon: '🎥', text: '<strong>4 finished videos</strong> — GREENGUARD Emotional Story (27s, best piece), Bedroom Before/After (7.5s), Dining Before/After (14s), ASMR Wood Grain (9.4s).' },
      { icon: '🎞️', text: '<strong>8 raw Luma Ray3 clips</strong> — Cinematic footage from real Shopify product photos. Ready for editing and compositing.' },
      { icon: '🖼️', text: '<strong>8 FLUX Pro lifestyle images</strong> — High-res product scenes usable for social, web, or as video inputs.' },
      { icon: '🎙️', text: '<strong>3 ElevenLabs voiceovers</strong> — Professional narration tracks. Jessica voice (warm, intimate delivery).' },
    ],
    keyFinding: {
      label: '✅ Pipeline Established',
      text: 'Full production pipeline working: Shopify CDN → FLUX Pro → Luma Ray3 → ElevenLabs → ffmpeg. Can now produce videos end-to-end without manual intervention.',
    },
    status: { color: '#22c55e', text: '47 total assets · Pipeline operational' },
  },

  // QA & Quality
  {
    name: 'QA & Quality',
    emoji: '📊',
    role: 'Independent Review',
    color: 'linear-gradient(135deg, #3b82f6, #2563eb)',
    grade: '6.4',
    gradeColor: '#f59e0b',
    stats: [
      { value: '6.4', label: 'Avg Score' },
      { value: '7.5', label: 'Best' },
      { value: '4.8', label: 'Worst' },
    ],
    accomplishments: [
      { icon: '🏆', text: '<strong>Best piece: TikTok concept (7.5/10)</strong> — "Shows understanding of platform culture. Hook is decent. Missing music/energy."' },
      { icon: '📈', text: '<strong>Good: Seasonal + UGC (6.7-7.3)</strong> — Solid execution. Safe but competent.' },
      { icon: '⚠️', text: '<strong>Weakest: Lifestyle concept (4.8/10)</strong> — "Generic lifestyle vibe. Could be any brand. No distinct POV or hook."' },
      { icon: '🎯', text: '<strong>QA Skeptic verdict</strong> — "Decent work. Shows understanding. But doesn\'t surprise. Gap between 6.4 and 8.5 is risk tolerance."' },
    ],
    keyFinding: {
      type: 'warning',
      label: '🔥 Honest Feedback',
      text: '"Muse delivers safe, competent, forgettable. She needs to fail spectacularly on concepts 1-2 so concept 3 is genuinely great. Playing it safe = invisible."',
    },
    status: { color: '#f59e0b', text: '6.4/10 average · Must push creative risk higher' },
  },

  // Learning Ladder
  {
    name: 'Learning Ladder',
    emoji: '🧠',
    role: 'Intelligence Compounding',
    color: 'linear-gradient(135deg, #f59e0b, #d97706)',
    grade: '50',
    gradeColor: '#22c55e',
    stats: [
      { value: '50', label: 'Lessons' },
      { value: '0', label: 'Validated' },
      { value: '3', label: 'Hypotheses' },
    ],
    accomplishments: [
      { icon: '📚', text: '<strong>50 lessons in learning.db</strong> — Heavy on production-pipeline and creative-standards. Learning the tools fast.' },
      { icon: '🔬', text: '<strong>Top lesson: Background music is the #1 gap</strong> — Every video needs ambient audio. Need royalty-free library, automated selection, and music-synced editing.' },
      { icon: '🎬', text: '<strong>Production pipeline lessons</strong> — Luma Ray3 aspect ratio bug (1:1 instead of 9:16), ffmpeg drawtext unavailable on macOS, fal.ai async returns 405.' },
      { icon: '⚠️', text: '<strong>0 validated learnings</strong> — Need to publish content and measure engagement. Can\'t validate until content goes live.' },
    ],
    keyFinding: {
      label: '🪜 The Ladder',
      text: 'Observations (50 lessons) → Hypotheses (3: Ken Burns vs Luma, GREENGUARD emotional angle, ASMR emerging format) → Validated (0 — needs live publishing) → Playbooks (0). Must publish to validate.',
    },
    status: { color: '#f59e0b', text: '50 lessons · Pipeline knowledge growing fast · No validations yet' },
  },

  // Hard Rules
  {
    name: 'Hard Rules',
    emoji: '🚫',
    role: 'Creative Standards',
    color: 'linear-gradient(135deg, #ef4444, #dc2626)',
    grade: '4',
    gradeColor: '#22c55e',
    stats: [
      { value: '4', label: 'Rules' },
      { value: '9:16', label: 'TikTok' },
      { value: '2s', label: 'Hook Window' },
    ],
    accomplishments: [
      { icon: '📷', text: '<strong>Start from REAL product photos</strong> — Shopify CDN images produce far better results than AI-generated products.' },
      { icon: '🎵', text: '<strong>Every video needs background music</strong> — Silence kills engagement. Non-negotiable.' },
      { icon: '⚡', text: '<strong>First 2 seconds must hook</strong> — Scroll-stopping or worthless. The audience decides in 0.5-2 seconds.' },
      { icon: '📐', text: '<strong>9:16 for TikTok/Reels, 16:9 for YouTube, 1:1 for Instagram feed</strong> — Platform-specific aspect ratios always.' },
    ],
    keyFinding: {
      label: '💡 The Standard',
      text: 'Every piece should be good enough for Webby/Cannes consideration. If it wouldn\'t win an award, it ships back for revision. Current QA of 6.4 is NOT there yet.',
    },
    status: { color: '#f59e0b', text: '4 rules · Standard is award-worthy · Not there yet' },
  },

  // Tonight's Plan
  {
    name: 'Tonight\'s Plan',
    emoji: '🚀',
    role: 'Improvement Roadmap',
    color: 'linear-gradient(135deg, #10b981, #059669)',
    grade: '5',
    gradeColor: '#22c55e',
    stats: [
      { value: '🎵', label: 'Music' },
      { value: '⏱️', label: 'Extend' },
      { value: '🔥', label: 'Hooks' },
    ],
    accomplishments: [
      { icon: '🎵', text: '<strong>Add background music to GREENGUARD video</strong> — Research royalty-free sources (ElevenLabs, freemusicarchive, Epidemic Sound).' },
      { icon: '⏱️', text: '<strong>Extend Bedroom B/A from 7.5s to 30s+</strong> — Add more lifestyle shots, slower reveal, richer narrative arc.' },
      { icon: '⚡', text: '<strong>Create 3 videos with scroll-stopping hooks</strong> — Text overlay in first 0.5s, dramatic zoom, question format.' },
      { icon: '🏆', text: '<strong>Self-score against Webby/Cannes winners</strong> — What makes THEIR first 2 seconds work? Study and apply.' },
      { icon: '📱', text: '<strong>Study 5 viral furniture/home TikToks</strong> — Hook patterns, pacing, music choices, what stops the scroll.' },
    ],
    keyFinding: {
      label: '💡 The Gap',
      text: 'Music + length + hooks. Fix these three and QA jumps from 6.4 to 8+. The pipeline works — the creative needs to push harder.',
    },
    status: { color: '#f59e0b', text: '5 improvement tasks · Music is the #1 priority' },
  },
];

function renderCards() {
  const container = document.getElementById('cards');
  const dotsContainer = document.getElementById('dots');
  let html = '';

  cards.forEach((card, i) => {
    html += `<div class="agent-card">
      <div class="agent-header" style="background:${card.color}">
        <div class="agent-emoji">${card.emoji}</div>
        <div class="agent-name">${card.name}</div>
        <div class="agent-role">${card.role}</div>
        <div class="agent-grade" style="color:${card.gradeColor}">${card.grade}</div>
      </div>
      <div class="agent-stats">
        ${card.stats.map(s => `
          <div class="stat">
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="agent-body">
        <div class="section-title">${i === cards.length - 1 ? 'Improvements Needed' : 'Key Points'}</div>
        ${card.accomplishments.map(a => `
          <div class="accomplishment">
            <span class="acc-icon">${a.icon}</span>
            <span class="acc-text">${a.text}</span>
          </div>
        `).join('')}
        ${card.keyFinding ? `
          <div class="key-finding ${card.keyFinding.type === 'warning' ? 'warning' : ''} ${card.keyFinding.type === 'info' ? 'info' : ''}">
            <div class="key-finding-label">${card.keyFinding.label}</div>
            <div class="key-finding-text">${card.keyFinding.text}</div>
          </div>
        ` : ''}
      </div>
      ${i === cards.length - 1 ? `
      <div class="todo-accordion">
        <div class="todo-accordion-header" onclick="toggleAccordion()">
          <span class="todo-accordion-title">📋 Live Task Status</span>
          <span class="todo-accordion-arrow" id="accordionArrow">▼</span>
        </div>
        <div class="todo-accordion-body" id="accordionBody" style="display:none;">
          <div class="todo-loading" id="todoLoading">Loading tasks...</div>
          <div id="todoList"></div>
        </div>
      </div>
      ` : ''}
      <div class="agent-footer">
        <div class="status-dot" style="background:${card.status.color}"></div>
        <span class="status-text">${card.status.text}</span>
      </div>
    </div>`;
  });

  container.innerHTML = html;

  // Dots
  dotsContainer.innerHTML = cards.map((_, i) =>
    `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`
  ).join('');

  // Scroll listener for dots
  container.addEventListener('scroll', () => {
    const cardWidth = container.firstElementChild.offsetWidth + 12;
    const activeIndex = Math.round(container.scrollLeft / cardWidth);
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === activeIndex);
    });
  });
}

let accordionOpen = false;
function toggleAccordion() {
  accordionOpen = !accordionOpen;
  const body = document.getElementById('accordionBody');
  const arrow = document.getElementById('accordionArrow');
  body.style.display = accordionOpen ? 'block' : 'none';
  arrow.textContent = accordionOpen ? '▲' : '▼';
  if (accordionOpen) fetchTodos();
}

async function fetchTodos() {
  const loading = document.getElementById('todoLoading');
  const list = document.getElementById('todoList');
  loading.style.display = 'block';
  list.innerHTML = '';

  try {
    const res = await fetch('https://ienable-admin-app-hqtw2.ondigitalocean.app/api/v1/agent-tasks/active');
    const json = await res.json();
    const tasks = (json.data || json || []).filter(t => t.agent.toLowerCase() === 'muse');

    const working = tasks.filter(t => t.status === 'working');
    const queued = tasks.filter(t => t.status === 'queued');
    const complete = tasks.filter(t => t.status === 'complete');

    loading.style.display = 'none';

    if (tasks.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:#6b7280;text-align:center;">No tasks in database</div>';
      return;
    }

    let html = '';

    if (working.length > 0) {
      html += '<div class="todo-group-label">🔄 In Progress</div>';
      working.forEach(t => {
        html += `<div class="todo-item working">
          <div class="todo-item-name">🔄 ${t.task_name}</div>
          ${t.task_detail ? `<div class="todo-item-detail">${t.task_detail}</div>` : ''}
        </div>`;
      });
    }

    if (queued.length > 0) {
      html += '<div class="todo-group-label">⏳ Up Next</div>';
      queued.forEach(t => {
        html += `<div class="todo-item queued">
          <div class="todo-item-name">⏳ ${t.task_name}</div>
          ${t.task_detail ? `<div class="todo-item-detail">${t.task_detail}</div>` : ''}
        </div>`;
      });
    }

    if (complete.length > 0) {
      html += '<div class="todo-group-label">✅ Done</div>';
      complete.forEach(t => {
        html += `<div class="todo-item complete">
          <div class="todo-item-name"><s>✅ ${t.task_name}</s></div>
          ${t.result_summary ? `<div class="todo-item-result">✓ ${t.result_summary}</div>` : ''}
        </div>`;
      });
    }

    const totalDone = complete.length;
    const totalAll = tasks.length;
    html += `<div class="todo-summary">${totalDone} of ${totalAll} complete</div>`;

    list.innerHTML = html;
  } catch(e) {
    loading.style.display = 'none';
    list.innerHTML = '<div style="padding:12px;color:#ef4444;text-align:center;">Failed to load tasks</div>';
  }
}

renderCards();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Todo Lists</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            height: 100vh;
            scroll-behavior: smooth;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        .card {
            min-width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .card-header.overview {
            background: linear-gradient(135deg, #5433ff 0%, #20bdff 50%, #a5fecb 100%);
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }

        .status-dot.working {
            background: #4ade80;
            animation: pulse-green 2s infinite;
        }

        .status-dot.idle {
            background: #9ca3af;
        }

        .status-dot.stale {
            background: #fbbf24;
            animation: pulse-amber 3s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        @keyframes pulse-amber {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .agent-tile {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .agent-tile:active {
            transform: scale(0.95);
        }

        .agent-emoji {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .agent-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #1f2937;
        }

        .agent-task-count {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .todo-list {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .todo-section {
            margin-bottom: 25px;
        }

        .todo-section:last-child {
            margin-bottom: 0;
        }

        .section-header {
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .task-item:last-child {
            margin-bottom: 0;
        }

        .task-item.working {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            animation: pulse-task 2s infinite;
        }

        .task-item.queued {
            background: #f3f4f6;
        }

        .task-item.complete {
            background: #f9fafb;
            opacity: 0.7;
        }

        .task-item.failed {
            background: #fee2e2;
        }

        @keyframes pulse-task {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .task-name {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-item.complete .task-name {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .flywheel-section {
            padding: 12px 16px;
            border-bottom: 2px solid #e5e7eb;
        }
        .flywheel-block {
            margin-bottom: 12px;
        }
        .flywheel-block.finding {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .flywheel-block.wins {
            background: #f0fdf4;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .flywheel-block.next-steps {
            background: #eff6ff;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
        }
        .flywheel-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #374151;
            margin-bottom: 6px;
        }
        .flywheel-text {
            font-size: 13px;
            color: #1f2937;
            line-height: 1.4;
        }
        .flywheel-item {
            font-size: 13px;
            color: #1f2937;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .flywheel-arrow {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            padding: 4px 0;
        }
        .task-detail {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.4;
            margin-top: 2px;
        }
        .task-result {
            font-size: 12px;
            color: #059669;
            font-style: italic;
            margin-top: 4px;
            padding-left: 24px;
        }

        .task-icon {
            font-size: 18px;
        }

        .task-count {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            text-align: center;
            margin-top: 15px;
        }

        .current-task-banner {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #f59e0b;
        }

        .current-task-label {
            font-size: 12px;
            font-weight: 600;
            color: #92400e;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .current-task-name {
            font-size: 16px;
            font-weight: 600;
            color: #78350f;
        }

        .nav-dots {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 2px solid rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-dot.active {
            background: white;
            transform: scale(1.3);
        }

        .footer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: #6b7280;
            z-index: 100;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .refresh-btn:active {
            transform: scale(0.9);
        }

        .refresh-btn.spinning {
            animation: spin 1s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .offline-badge {
            background: #ef4444;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .summary-text {
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-align: center;
            margin-top: 15px;
            opacity: 0.95;
        }

        @media (max-width: 480px) {
            .card {
                padding: 15px;
            }

            .card-header {
                padding: 25px 15px;
            }

            .card-title {
                font-size: 24px;
            }

            .agent-grid {
                gap: 12px;
            }

            .agent-tile {
                padding: 15px;
            }

            .agent-emoji {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container"></div>
    
    <div class="nav-dots" id="navDots"></div>
    
    <div class="footer">
        <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
        <span id="lastRefresh">Loading...</span>
        <span id="offlineBadge" class="offline-badge" style="display: none;">Offline</span>
    </div>

    <script>
        const API_BASE = 'https://ienable-admin-app-hqtw2.ondigitalocean.app/api/v1';

// Defensive data normalization helpers
function normalizePlan(plan) {
  if (Array.isArray(plan)) return plan;
  if (typeof plan === 'string') {
    return plan.includes('\n') ? plan.split('\n').filter(s => s.trim()) : [plan];
  }
  return [];
}

function normalizeStats(stats) {
  if (Array.isArray(stats)) return stats;
  if (stats && typeof stats === 'object') {
    return Object.entries(stats)
      .filter(([k, v]) => !['created_at','updated_at','id','agent_name','company_id','date'].includes(k))
      .map(([k, v]) => ({
        label: k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
        value: String(v)
      }))
      .slice(0, 4);
  }
  return [];
}

function normalizeArray(arr) {
  if (Array.isArray(arr)) return arr;
  if (typeof arr === 'string') {
    return arr.includes('\n') ? arr.split('\n').filter(s => s.trim()) : [arr];
  }
  if (arr && typeof arr === 'object') {
    return Object.values(arr);
  }
  return [];
}

        const REFRESH_INTERVAL = 60000; // 60 seconds
        const STALE_THRESHOLD = 30 * 60 * 1000; // 30 minutes

        const AGENTS = [
            { id: 'Orion', emoji: '🌟', role: 'COO' },
            { id: 'Tom', emoji: '📈', role: 'Trading Intelligence' },
            { id: 'Adaline', emoji: '📢', role: 'Ads Intelligence' },
            { id: 'Apollo', emoji: '✍️', role: 'Content & SEO' },
            { id: 'Muse', emoji: '🎨', role: 'Creative Director' },
            { id: 'iEnable', emoji: '🤖', role: 'Product & Engineering' }
        ];
        let reportCards = {};

        let allTasks = [];
        let allAgents = [];
        let refreshTimer = null;
        let lastRefreshTime = null;
        let isVisible = true;

        async function fetchData() {
            try {
                const [tasksRes, agentsRes, cardsRes] = await Promise.all([
                    fetch(`${API_BASE}/agent-tasks/active`),
                    fetch(`${API_BASE}/agent-status`),
                    fetch(`${API_BASE}/report-cards/latest`).catch(() => null)
                ]);

                if (!tasksRes.ok || !agentsRes.ok) {
                    throw new Error('API request failed');
                }

                const tasksData = await tasksRes.json();
                const agentsData = await agentsRes.json();
                allTasks = tasksData.data || tasksData || [];
                allAgents = agentsData.data || agentsData || [];

                if (cardsRes && cardsRes.ok) {
                    const cardsData = await cardsRes.json();
                    const cards = cardsData.data || cardsData || [];
                    reportCards = {};
                    cards.forEach(c => { reportCards[c.agent_name.toLowerCase()] = c; });
                }

                document.getElementById('offlineBadge').style.display = 'none';
                lastRefreshTime = Date.now();
                updateLastRefreshText();
                renderCards();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('offlineBadge').style.display = 'block';
                if (allTasks.length === 0 && allAgents.length === 0) {
                    renderCards(); // Show empty state
                }
            }
        }

        function updateLastRefreshText() {
            const now = Date.now();
            const diff = Math.floor((now - lastRefreshTime) / 1000);
            const text = diff < 5 ? 'Just now' : `${diff}s ago`;
            document.getElementById('lastRefresh').textContent = `Updated ${text}`;
        }

        function getAgentStatus(agentId) {
            const agent = allAgents.find(a => a.agent.toLowerCase() === agentId.toLowerCase());
            if (!agent) return { status: 'idle', isStale: false, currentTask: null };

            const lastUpdated = new Date(agent.last_updated).getTime();
            const isStale = Date.now() - lastUpdated > STALE_THRESHOLD;

            return {
                status: agent.status || 'idle',
                isStale,
                currentTask: agent.current_task
            };
        }

        function getAgentTasks(agentId) {
            return allTasks.filter(t => t.agent.toLowerCase() === agentId.toLowerCase());
        }

        function getTasksByStatus(tasks) {
            return {
                working: tasks.filter(t => t.status === 'working'),
                queued: tasks.filter(t => t.status === 'queued'),
                complete: tasks.filter(t => t.status === 'complete'),
                failed: tasks.filter(t => t.status === 'failed')
            };
        }

        function renderCards() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            // Card 1: Overview
            container.appendChild(renderOverviewCard());

            // Cards 2-7: Individual agents
            AGENTS.forEach(agent => {
                container.appendChild(renderAgentCard(agent));
            });

            renderNavDots();
            updateActiveNavDot();
        }

        function renderOverviewCard() {
            const card = document.createElement('div');
            card.className = 'card';

            const totalTasks = allTasks.length;
            const completeTasks = allTasks.filter(t => t.status === 'complete').length;

            card.innerHTML = `
                <div class="card-header overview">
                    <div class="card-title">📊 Agent Overview</div>
                    <div class="card-subtitle">Real-time task monitoring</div>
                    <div class="summary-text">${completeTasks} of ${totalTasks} tasks complete</div>
                </div>
                <div class="agent-grid" id="agentGrid"></div>
            `;

            const grid = card.querySelector('#agentGrid');
            AGENTS.forEach((agent, index) => {
                const tasks = getAgentTasks(agent.id);
                const { status, isStale } = getAgentStatus(agent.id);
                const complete = tasks.filter(t => t.status === 'complete').length;
                const total = tasks.length;
                const percentage = total > 0 ? (complete / total) * 100 : 0;

                const tile = document.createElement('div');
                tile.className = 'agent-tile';
                tile.onclick = () => scrollToCard(index + 1);

                const statusClass = status === 'working' ? 'working' : (isStale ? 'stale' : 'idle');

                tile.innerHTML = `
                    <div class="agent-emoji">${agent.emoji}</div>
                    <div class="agent-name">
                        ${agent.id}
                        <span class="status-dot ${statusClass}"></span>
                    </div>
                    <div class="agent-task-count">${complete}/${total} done</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                `;

                grid.appendChild(tile);
            });

            return card;
        }

        function renderAgentCard(agent) {
            const card = document.createElement('div');
            card.className = 'card';

            const tasks = getAgentTasks(agent.id);
            const { status, isStale, currentTask } = getAgentStatus(agent.id);
            const tasksByStatus = getTasksByStatus(tasks);
            const complete = tasksByStatus.complete.length;
            const total = tasks.length;

            const statusClass = status === 'working' ? 'working' : (isStale ? 'stale' : 'idle');

            const rc = reportCards[agent.id.toLowerCase()];
            const gradeHtml = rc ? `<span style="background:${rc.grade_color || '#6b7280'};color:white;padding:2px 10px;border-radius:8px;font-size:16px;font-weight:700;margin-left:8px">${rc.grade}</span>` : '';
            const statsHtml = rc && rc.stats ? `<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">${normalizeStats(rc.stats).map(s => `<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#1f2937">${s.value}</div><div style="font-size:11px;color:#6b7280">${s.label}</div></div>`).join('')}</div>` : '';

            // Build flywheel section from report card
            let flywheelHtml = '';
            if (rc) {
                flywheelHtml = '<div class="flywheel-section">';

                // Key finding = the breakthrough
                if (rc.key_finding) {
                    flywheelHtml += `<div class="flywheel-block finding">
                        <div class="flywheel-label">💡 Key Insight</div>
                        <div class="flywheel-text">${rc.key_finding.text}</div>
                    </div>`;
                }

                // Accomplishments = what was achieved
                const accomplishments = normalizeArray(rc.accomplishments);
                if (accomplishments.length > 0) {
                    flywheelHtml += `<div class="flywheel-block wins">
                        <div class="flywheel-label">🏆 Last Session Wins</div>
                        ${accomplishments.slice(0, 3).map(a => {
                            const icon = (typeof a === 'object' && a.icon) ? a.icon : '✓';
                            const text = (typeof a === 'object' && a.text) ? a.text : String(a);
                            return `<div class="flywheel-item">${icon} ${text}</div>`;
                        }).join('')}
                    </div>`;
                }

                // Tonight plan = what's next (the bridge to today's tasks)
                const tonightPlan = normalizeArray(rc.tonight_plan);
                if (tonightPlan.length > 0) {
                    flywheelHtml += `<div class="flywheel-block next-steps">
                        <div class="flywheel-label">🚀 Next Steps</div>
                        ${tonightPlan.map(p => `<div class="flywheel-item">→ ${p}</div>`).join('')}
                    </div>`;
                }

                // Arrow bridging to tasks
                flywheelHtml += `<div class="flywheel-arrow">⬇️ Today's Tasks</div>`;
                flywheelHtml += '</div>';
            }

            let html = `
                <div class="card-header">
                    <div class="card-title">
                        ${agent.emoji} ${agent.id}
                        ${gradeHtml}
                        <span class="status-dot ${statusClass}"></span>
                    </div>
                    <div class="card-subtitle">${agent.role}</div>
                    ${statsHtml}
                </div>
                ${flywheelHtml}
            `;

            if (currentTask && status === 'working') {
                html += `
                    <div class="current-task-banner">
                        <div class="current-task-label">⚡ Currently Working On</div>
                        <div class="current-task-name">${currentTask}</div>
                    </div>
                `;
            }

            if (tasks.length === 0) {
                html += `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>No tasks yet</div>
                    </div>
                `;
            } else {
                html += '<div class="todo-list">';

                // Working tasks
                if (tasksByStatus.working.length > 0) {
                    html += '<div class="todo-section">';
                    html += '<div class="section-header">🔄 Working</div>';
                    tasksByStatus.working.forEach(task => {
                        html += renderTask(task, 'working');
                    });
                    html += '</div>';
                }

                // Queued tasks
                if (tasksByStatus.queued.length > 0) {
                    html += '<div class="todo-section">';
                    html += '<div class="section-header">⏳ Queued</div>';
                    tasksByStatus.queued.forEach(task => {
                        html += renderTask(task, 'queued');
                    });
                    html += '</div>';
                }

                // Complete tasks
                if (tasksByStatus.complete.length > 0) {
                    html += '<div class="todo-section">';
                    html += '<div class="section-header">✅ Complete</div>';
                    tasksByStatus.complete.forEach(task => {
                        html += renderTask(task, 'complete');
                    });
                    html += '</div>';
                }

                // Failed tasks
                if (tasksByStatus.failed.length > 0) {
                    html += '<div class="todo-section">';
                    html += '<div class="section-header">❌ Failed</div>';
                    tasksByStatus.failed.forEach(task => {
                        html += renderTask(task, 'failed');
                    });
                    html += '</div>';
                }

                html += `<div class="task-count">${complete} of ${total} complete</div>`;
                html += '</div>';
            }

            card.innerHTML = html;
            return card;
        }

        function renderTask(task, status) {
            const icons = {
                working: '🔄',
                queued: '⏳',
                complete: '✅',
                failed: '❌'
            };

            const resultHtml = (status === 'complete' && task.result_summary) ? `<div class="task-result">✓ ${task.result_summary}</div>` : '';

            return `
                <div class="task-item ${status}">
                    <div class="task-name">
                        <span class="task-icon">${icons[status]}</span>
                        ${task.task_name}
                    </div>
                    ${task.task_detail ? `<div class="task-detail">${task.task_detail}</div>` : ''}
                    ${resultHtml}
                </div>
            `;
        }

        function renderNavDots() {
            const navDots = document.getElementById('navDots');
            navDots.innerHTML = '';

            for (let i = 0; i < AGENTS.length + 1; i++) {
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.onclick = () => scrollToCard(i);
                navDots.appendChild(dot);
            }
        }

        function updateActiveNavDot() {
            const container = document.getElementById('container');
            const scrollLeft = container.scrollLeft;
            const cardWidth = window.innerWidth;
            const activeIndex = Math.round(scrollLeft / cardWidth);

            const dots = document.querySelectorAll('.nav-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === activeIndex);
            });
        }

        function scrollToCard(index) {
            const container = document.getElementById('container');
            const cardWidth = window.innerWidth;
            container.scrollTo({
                left: index * cardWidth,
                behavior: 'smooth'
            });
        }

        function startRefreshLoop() {
            if (refreshTimer) clearInterval(refreshTimer);

            refreshTimer = setInterval(() => {
                if (isVisible) {
                    fetchData();
                }
                updateLastRefreshText();
            }, REFRESH_INTERVAL);

            // Update "X seconds ago" text more frequently
            setInterval(() => {
                if (lastRefreshTime) {
                    updateLastRefreshText();
                }
            }, 1000);
        }

        // Page Visibility API
        document.addEventListener('visibilitychange', () => {
            isVisible = !document.hidden;
            if (isVisible && lastRefreshTime && Date.now() - lastRefreshTime > REFRESH_INTERVAL) {
                fetchData();
            }
        });

        // Manual refresh button
        document.getElementById('refreshBtn').addEventListener('click', function() {
            this.classList.add('spinning');
            fetchData();
            setTimeout(() => {
                this.classList.remove('spinning');
            }, 1000);
        });

        // Scroll event for nav dots
        document.getElementById('container').addEventListener('scroll', updateActiveNavDot);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const container = document.getElementById('container');
            const cardWidth = window.innerWidth;
            const currentIndex = Math.round(container.scrollLeft / cardWidth);

            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                scrollToCard(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < AGENTS.length) {
                scrollToCard(currentIndex + 1);
            }
        });

        // Initialize
        fetchData();
        startRefreshLoop();
    </script>
</body>
</html>

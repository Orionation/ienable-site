<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Creative Production Report — Anne</title>
<style>
  :root {
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
    --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
    --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
    --green-50: #f0fdf4; --green-100: #dcfce7; --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d;
    --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-500: #3b82f6; --blue-600: #2563eb;
    --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-600: #d97706;
    --red-50: #fef2f2; --red-100: #fee2e2; --red-500: #ef4444; --red-600: #dc2626;
    --purple-50: #faf5ff; --purple-500: #8b5cf6; --purple-600: #7c3aed;
    --pink-50: #fdf2f8; --pink-500: #ec4899; --pink-600: #db2777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 20px 16px 12px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-date {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
  }

  .header-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    margin-top: 2px;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  /* Swipe container */
  .cards-container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    gap: 12px;
    scrollbar-width: none;
  }

  .cards-container::-webkit-scrollbar { display: none; }

  /* Dots indicator */
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px 0 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-300);
    transition: all 0.2s ease;
  }

  .dot.active {
    background: var(--gray-800);
    width: 20px;
    border-radius: 4px;
  }

  /* Agent Card */
  .agent-card {
    flex: 0 0 calc(100vw - 40px);
    max-width: 400px;
    scroll-snap-align: center;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .agent-header {
    padding: 20px;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .agent-header::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .agent-emoji {
    font-size: 36px;
    margin-bottom: 8px;
  }

  .agent-name {
    font-size: 20px;
    font-weight: 800;
  }

  .agent-role {
    font-size: 12px;
    opacity: 0.8;
    font-weight: 500;
  }

  .agent-grade {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* Stats row */
  .agent-stats {
    display: flex;
    padding: 12px 20px;
    gap: 8px;
    border-bottom: 1px solid var(--gray-100);
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--gray-800);
  }

  .stat-label {
    font-size: 10px;
    color: var(--gray-400);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* Accomplishments */
  .agent-body {
    padding: 16px 20px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .accomplishment {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: flex-start;
  }

  .accomplishment:last-child { margin-bottom: 0; }

  .acc-icon {
    font-size: 14px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .acc-text {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.5;
  }

  .acc-text strong {
    color: var(--gray-800);
  }

  /* Key finding callout */
  .key-finding {
    background: var(--green-50);
    border: 1px solid var(--green-100);
    border-radius: 12px;
    padding: 12px;
    margin-top: 12px;
  }

  .key-finding.warning {
    background: var(--amber-50);
    border-color: var(--amber-100);
  }

  .key-finding.info {
    background: var(--blue-50);
    border-color: var(--blue-100);
  }

  .key-finding-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--green-600);
    margin-bottom: 4px;
  }

  .key-finding.warning .key-finding-label {
    color: var(--amber-600);
  }

  .key-finding.info .key-finding-label {
    color: var(--blue-600);
  }

  .key-finding-text {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.5;
  }

  /* Bottom status */
  .agent-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .status-text {
    font-size: 12px;
    color: var(--gray-500);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-date">February 27, 2026 · Overnight Production</div>
  <div class="header-title">🎨 Creative Production Report</div>
  <div class="header-subtitle">For Anne · Muse's Work</div>
</div>

<div class="dots" id="dots"></div>

<div class="cards-container" id="cards"></div>

<script>
const cards = [
  // Production Summary
  {
    name: 'Production Summary',
    emoji: '🎬',
    role: 'Overnight Output by Muse',
    color: 'linear-gradient(135deg, #ec4899, #f43f5e)',
    grade: '47',
    gradeColor: '#22c55e',
    stats: [
      { value: '47', label: 'Files' },
      { value: '4', label: 'Videos' },
      { value: '6.4', label: 'QA Score' },
    ],
    accomplishments: [
      { icon: '🎥', text: '<strong>4 finished videos ready</strong> — GREENGUARD Emotional Story (27s), Bedroom Before/After (7.5s), Dining Before/After (14s), ASMR Wood Grain (9.4s).' },
      { icon: '🎞️', text: '<strong>8 raw Luma clips</strong> — Cinematic footage generated. Ready for editing, color grading, and compositing.' },
      { icon: '🖼️', text: '<strong>8 FLUX images</strong> — High-res product lifestyle scenes. Usable for social, web, or as video inputs.' },
      { icon: '🎙️', text: '<strong>3 voiceovers</strong> — ElevenLabs narration tracks. Professional quality, ready to mix.' },
    ],
    keyFinding: {
      label: '✅ Ready to Deploy',
      text: '4 videos are polished and ready for immediate use in ads or social. Best piece: Bedroom Before/After (compact, high-impact, perfect for TikTok/Reels).',
    },
    status: { color: '#22c55e', text: 'All files delivered · Videos render-ready' },
  },

  // Videos Ready
  {
    name: 'Videos Ready',
    emoji: '🎞️',
    role: '4 Finished Pieces',
    color: 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
    grade: '4',
    gradeColor: '#22c55e',
    stats: [
      { value: '27s', label: 'Longest' },
      { value: '7.5s', label: 'Shortest' },
      { value: '1080p', label: 'Quality' },
    ],
    accomplishments: [
      { icon: '🌿', text: '<strong>GREENGUARD Emotional Story (27s)</strong> — Emotive narrative about safety/sustainability. Perfect for YouTube pre-roll or homepage hero.' },
      { icon: '🛏️', text: '<strong>Bedroom Before/After (7.5s)</strong> — Transformation visual. Compact, scroll-stopping. Ideal for TikTok/Reels/Instagram.' },
      { icon: '🍽️', text: '<strong>Dining Before/After (14s)</strong> — Mid-length transformation. Works for Stories, Reels, or as part of longer edits.' },
      { icon: '🪵', text: '<strong>ASMR Wood Grain (9.4s)</strong> — Sensory close-up. Great for brand differentiation, product detail showcase.' },
    ],
    keyFinding: {
      type: 'info',
      label: '🏆 Top Piece',
      text: 'Bedroom Before/After scored 7.5/10 in QA review — highest of the night. Short, punchy, visually clear. Should be first to test in ads.',
    },
    status: { color: '#22c55e', text: 'All videos exported · 1080p MP4 format' },
  },

  // Creative Research
  {
    name: 'Creative Research',
    emoji: '🔬',
    role: 'Super Bowl 2026 Analysis',
    color: 'linear-gradient(135deg, #f59e0b, #d97706)',
    grade: '3',
    gradeColor: '#22c55e',
    stats: [
      { value: '3', label: 'Trends' },
      { value: '3', label: 'Ad Studies' },
      { value: '16KB', label: 'Research' },
    ],
    accomplishments: [
      { icon: '🤖', text: '<strong>AI invasion trend</strong> — Super Bowl 2026 dominated by AI-generated content. Authenticity is the new differentiator.' },
      { icon: '💙', text: '<strong>Emotion-first storytelling</strong> — Winning ads led with feeling, not features. Data point: Apple\'s "Privacy" ad beat all product demos.' },
      { icon: '🎯', text: '<strong>Constraint-based creativity</strong> — Best work came from tight briefs. IKEA\'s "One Room" ad (single-room focus) crushed broader campaigns.' },
      { icon: '📊', text: '<strong>3 award-winning ad breakdowns</strong> — IKEA, Apple, and one other analyzed for structure, pacing, emotional beats, and production techniques.' },
    ],
    keyFinding: {
      type: 'warning',
      label: '📋 Muse Needs This',
      text: 'Research is excellent. But concepts aren\'t leveraging it yet. Next round: apply emotion-first + constraint-based principles directly to furniture creative.',
    },
    status: { color: '#22c55e', text: 'Research complete · Ready for creative application' },
  },

  // QA Scores
  {
    name: 'QA Scores',
    emoji: '📊',
    role: 'Independent Review',
    color: 'linear-gradient(135deg, #3b82f6, #2563eb)',
    grade: '6.4',
    gradeColor: '#f59e0b',
    stats: [
      { value: '6.4', label: 'Avg' },
      { value: '7.5', label: 'Best' },
      { value: '4.8', label: 'Worst' },
    ],
    accomplishments: [
      { icon: '🏆', text: '<strong>Best: TikTok concept (7.5/10)</strong> — "Shows understanding of platform culture. Hook is decent. Missing music/energy."' },
      { icon: '📈', text: '<strong>Good: Seasonal + UGC (6.7-7.3)</strong> — Solid execution. Safe but competent. Would perform but won\'t break through.' },
      { icon: '⚠️', text: '<strong>Weakest: Lifestyle concept (4.8/10)</strong> — "Generic lifestyle vibe. Could be any brand. No distinct POV or hook."' },
      { icon: '🎯', text: '<strong>QA Skeptic verdict</strong> — "Decent work. Shows understanding. But doesn\'t surprise. Gap between 6.4 and 8.5 is risk tolerance."' },
    ],
    keyFinding: {
      type: 'warning',
      label: '🔥 Honest Feedback',
      text: '"Muse delivers safe, competent, forgettable. She needs to fail spectacularly on concepts 1-2 so concept 3 is genuinely great. Playing it safe = invisible."',
    },
    status: { color: '#f59e0b', text: 'QA complete · Scores recorded' },
  },

  // Next Steps
  {
    name: 'Next Steps',
    emoji: '🚀',
    role: 'Improvement Roadmap',
    color: 'linear-gradient(135deg, #10b981, #059669)',
    grade: '5',
    gradeColor: '#22c55e',
    stats: [
      { value: '5', label: 'Gaps' },
      { value: '🎵', label: 'Music' },
      { value: '⏱️', label: 'Length' },
    ],
    accomplishments: [
      { icon: '🎵', text: '<strong>Add background music</strong> — Videos feel flat without audio bed. License tracks or use royalty-free library (Epidemic, Artlist).' },
      { icon: '⏱️', text: '<strong>Videos too short</strong> — 7.5s is TikTok-friendly but limits storytelling. Test 15-20s versions with richer narrative arcs.' },
      { icon: '⚡', text: '<strong>Need scroll-stopping hooks</strong> — First 0.5s must grab attention. Current intros are too slow. Add motion/surprise/question upfront.' },
      { icon: '🎨', text: '<strong>Text overlay compositing</strong> — No on-screen text yet. Add captions, CTAs, or product benefits as burned-in text for social.' },
      { icon: '🔥', text: '<strong>Risk tolerance</strong> — Muse needs permission to fail. Encourage 2-3 wild concepts per batch alongside safe ones.' },
    ],
    keyFinding: {
      label: '💡 Action Plan',
      text: 'Next sprint: (1) Add music to all 4 videos, (2) Create 3 "risky" concepts using emotion-first research, (3) Test 15s versions with stronger hooks.',
    },
    status: { color: '#f59e0b', text: 'Feedback delivered · Ready for iteration' },
  },
];

function renderCards() {
  const container = document.getElementById('cards');
  const dotsContainer = document.getElementById('dots');
  let html = '';

  cards.forEach((card, i) => {
    html += `<div class="agent-card">
      <div class="agent-header" style="background:${card.color}">
        <div class="agent-emoji">${card.emoji}</div>
        <div class="agent-name">${card.name}</div>
        <div class="agent-role">${card.role}</div>
        <div class="agent-grade" style="color:${card.gradeColor}">${card.grade}</div>
      </div>
      <div class="agent-stats">
        ${card.stats.map(s => `
          <div class="stat">
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="agent-body">
        <div class="section-title">${i === cards.length - 1 ? 'Improvements Needed' : 'Key Points'}</div>
        ${card.accomplishments.map(a => `
          <div class="accomplishment">
            <span class="acc-icon">${a.icon}</span>
            <span class="acc-text">${a.text}</span>
          </div>
        `).join('')}
        ${card.keyFinding ? `
          <div class="key-finding ${card.keyFinding.type === 'warning' ? 'warning' : ''} ${card.keyFinding.type === 'info' ? 'info' : ''}">
            <div class="key-finding-label">${card.keyFinding.label}</div>
            <div class="key-finding-text">${card.keyFinding.text}</div>
          </div>
        ` : ''}
      </div>
      <div class="agent-footer">
        <div class="status-dot" style="background:${card.status.color}"></div>
        <span class="status-text">${card.status.text}</span>
      </div>
    </div>`;
  });

  container.innerHTML = html;

  // Dots
  dotsContainer.innerHTML = cards.map((_, i) =>
    `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`
  ).join('');

  // Scroll listener for dots
  container.addEventListener('scroll', () => {
    const cardWidth = container.firstElementChild.offsetWidth + 12;
    const activeIndex = Math.round(container.scrollLeft / cardWidth);
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === activeIndex);
    });
  });
}

renderCards();
</script>
</body>
</html>

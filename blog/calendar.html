.post-pill:hover {

}
.post-pill.published {

// Type labels and colors
const typeConfig = {
  'thought-leadership': {label:'Thought Leadership',cls:'type-thought-leadership'},
  'how-to': {label:'How-To Guide',cls:'type-how-to'},
  'comparison': {label:'Comparison',cls:'type-comparison'},
  'listicle': {label:'Listicle',cls:'type-listicle'},
  'news-reaction': {label:'News Reaction',cls:'type-news-reaction'},
  'case-study': {label:'Case Study',cls:'type-case-study'},
  'meta': {label:'Meta / Recap',cls:'type-meta'},
};

let currentMonth = 'feb';

function showMonth(m) {
  currentMonth = m;
  document.getElementById('btn-feb').classList.toggle('active', m==='feb');
  document.getElementById('btn-mar').classList.toggle('active', m==='mar');
  document.getElementById('month-title').textContent = m==='feb' ? 'February 2026' : 'March 2026';
  renderCalendar();
  renderMobileAgenda();
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const year = 2026;
  const month = currentMonth === 'feb' ? 1 : 2; // 0-indexed
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d => `<div class="day-header">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="day-cell empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `2026-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayPosts = posts.filter(p => p.date === dateStr);
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const isPast = new Date(year,month,d) < new Date(today.getFullYear(),today.getMonth(),today.getDate());
    let cls = 'day-cell';
    if (isToday) cls += ' today';
    else if (isPast) cls += ' past';

    html += `<div class="${cls}"><div class="day-number">${d}</div>`;
    dayPosts.forEach((p,i) => {
      const tc = typeConfig[p.type] || typeConfig['thought-leadership'];
      let pillCls = `post-pill ${tc.cls}`;
      if (p.published) pillCls += ' published';
      const timeLabel = p.time && p.time !== '—' ? `<span class="time-slot">${p.time}</span>` : '';
      html += `<div class="${pillCls}" onclick="showDetail(${posts.indexOf(p)})" title="${p.title}">${timeLabel}${truncate(p.title,38)}</div>`;
    });
    html += '</div>';
  }

  // Empty cells after last day
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 0; i < remaining; i++) {
    html += '<div class="day-cell empty"></div>';
  }

  grid.innerHTML = html;
}

function truncate(s, n) {
  return s.length > n ? s.substring(0, n) + '…' : s;
}

function showDetail(idx) {
  const p = posts[idx];
  const tc = typeConfig[p.type] || typeConfig['thought-leadership'];
  let html = `<button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('active')">&times;</button>`;
  html += `<h2>${p.title}</h2>`;
  html += `<div class="modal-meta">`;
  html += `<span class="modal-tag ${tc.cls}">${tc.label}</span>`;
  html += `<span class="modal-tag" style="background:rgba(255,255,255,0.05);color:#aaa">${p.date}</span>`;
  if (p.time && p.time !== '—') html += `<span class="modal-tag" style="background:rgba(255,255,255,0.05);color:#aaa">${p.time} ET</span>`;
  if (p.words) html += `<span class="modal-tag" style="background:rgba(255,255,255,0.05);color:#aaa">${p.words} words</span>`;
  if (p.published) html += `<span class="modal-tag" style="background:rgba(34,197,94,0.2);color:#4ade80">✓ Published</span>`;
  if (p.isOutline) html += `<span class="modal-tag" style="background:rgba(251,191,36,0.2);color:#fbbf24">📋 Outline Only</span>`;
  html += `</div>`;
  html += `<div class="modal-section"><h3>Slug</h3><p style="font-family:monospace;font-size:0.85rem;color:#7b2fff">/blog/${p.slug}.html</p></div>`;
  html += `<div class="modal-section"><h3>Primary Keyword</h3><p><span class="keyword-primary">${p.primary}</span></p></div>`;
  if (p.secondary && p.secondary.length) {
    html += `<div class="modal-section"><h3>Secondary Keywords</h3><p>${p.secondary.map(k=>`<span class="keyword-secondary">${k}</span>`).join(' ')}</p></div>`;
  }
  if (p.outline && p.outline.length) {
    html += `<div class="modal-section"><h3>Outline</h3><ul>${p.outline.map(o=>`<li>${o}</li>`).join('')}</ul></div>`;
  }
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('active');
  }
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('active');
});

function renderMobileAgenda() {
  const container = document.getElementById('mobile-agenda');
  const year = 2026;
  const month = currentMonth === 'feb' ? 1 : 2;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  
  let html = '';
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `2026-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayPosts = posts.filter(p => p.date === dateStr);
    if (dayPosts.length === 0) continue;
    
    const dateObj = new Date(year, month, d);
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const weekday = weekdays[dateObj.getDay()];
    
    html += `<div class="agenda-day${isToday ? ' today' : ''}">`;
    html += `<div class="agenda-day-header">`;
    html += `<div><span class="day-label">${weekday}, ${currentMonth === 'feb' ? 'Feb' : 'Mar'} ${d}</span>${isToday ? ' <span style="color:#00d4ff;font-size:0.7rem">TODAY</span>' : ''}</div>`;
    html += `<span class="post-count">${dayPosts.length} post${dayPosts.length > 1 ? 's' : ''}</span>`;
    html += `</div>`;
    
    dayPosts.forEach(p => {
      const tc = typeConfig[p.type] || typeConfig['thought-leadership'];
      let postCls = 'agenda-post';
      if (p.published) postCls += ' published';
      
      html += `<div class="${postCls}" onclick="showDetail(${posts.indexOf(p)})">`;
      if (p.time && p.time !== '—') {
        html += `<div class="agenda-post-time">🕐 ${p.time} ET</div>`;
      }
      html += `<div class="agenda-post-title">${p.title}</div>`;
      html += `<div class="agenda-post-meta">`;
      html += `<span class="agenda-type-badge ${tc.cls}">${tc.label}</span>`;
      html += `<span class="agenda-keyword">${p.primary}</span>`;
      if (p.words) html += `<span style="font-size:0.65rem;color:#666">${p.words}w</span>`;
      if (p.published) html += `<span style="font-size:0.65rem;color:#4ade80">✓ Published</span>`;
      html += `</div></div>`;
    });
    
    html += `</div>`;
  }
  
  container.innerHTML = html;
}

// Initial render
renderCalendar();
renderMobileAgenda();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Adaline's Report Card</title>
<style>
  :root {
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
    --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
    --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
    --green-50: #f0fdf4; --green-100: #dcfce7; --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d;
    --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-500: #3b82f6; --blue-600: #2563eb;
    --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-600: #d97706;
    --red-50: #fef2f2; --red-100: #fee2e2; --red-500: #ef4444; --red-600: #dc2626;
    --purple-50: #faf5ff; --purple-500: #8b5cf6; --purple-600: #7c3aed;
    --pink-50: #fdf2f8; --pink-500: #ec4899; --pink-600: #db2777;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 20px 16px 12px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-date {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
  }

  .header-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    margin-top: 2px;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 2px;
  }

  /* Swipe container */
  .cards-container {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    gap: 12px;
    scrollbar-width: none;
  }

  .cards-container::-webkit-scrollbar { display: none; }

  /* Dots indicator */
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 8px 0 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray-300);
    transition: all 0.2s ease;
  }

  .dot.active {
    background: var(--gray-800);
    width: 20px;
    border-radius: 4px;
  }

  /* Agent Card */
  .agent-card {
    flex: 0 0 calc(100vw - 40px);
    max-width: 400px;
    scroll-snap-align: center;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .agent-header {
    padding: 20px;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .agent-header::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .agent-emoji {
    font-size: 36px;
    margin-bottom: 8px;
  }

  .agent-name {
    font-size: 20px;
    font-weight: 800;
  }

  .agent-role {
    font-size: 12px;
    opacity: 0.8;
    font-weight: 500;
  }

  .agent-grade {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    backdrop-filter: blur(4px);
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* Stats row */
  .agent-stats {
    display: flex;
    padding: 12px 20px;
    gap: 8px;
    border-bottom: 1px solid var(--gray-100);
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--gray-800);
  }

  .stat-label {
    font-size: 10px;
    color: var(--gray-400);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* Accomplishments */
  .agent-body {
    padding: 16px 20px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--gray-400);
    margin-bottom: 8px;
  }

  .accomplishment {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: flex-start;
  }

  .accomplishment:last-child { margin-bottom: 0; }

  .acc-icon {
    font-size: 14px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .acc-text {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.5;
  }

  .acc-text strong {
    color: var(--gray-800);
  }

  /* Key finding callout */
  .key-finding {
    background: var(--green-50);
    border: 1px solid var(--green-100);
    border-radius: 12px;
    padding: 12px;
    margin-top: 12px;
  }

  .key-finding.warning {
    background: var(--amber-50);
    border-color: var(--amber-100);
  }

  .key-finding.info {
    background: var(--blue-50);
    border-color: var(--blue-100);
  }

  .key-finding-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--green-600);
    margin-bottom: 4px;
  }

  .key-finding.warning .key-finding-label {
    color: var(--amber-600);
  }

  .key-finding.info .key-finding-label {
    color: var(--blue-600);
  }

  .key-finding-text {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.5;
  }

  /* Bottom status */
  .agent-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .status-text {
    font-size: 12px;
    color: var(--gray-500);
  }
</style>
</head>

function renderCards() {
  const container = document.getElementById('cards');
  const dotsContainer = document.getElementById('dots');
  let html = '';

  cards.forEach((card, i) => {
    html += `<div class="agent-card">
      <div class="agent-header" style="background:${card.color}">
        <div class="agent-emoji">${card.emoji}</div>
        <div class="agent-name">${card.name}</div>
        <div class="agent-role">${card.role}</div>
        <div class="agent-grade" style="color:${card.gradeColor}">${card.grade}</div>
      </div>
      <div class="agent-stats">
        ${card.stats.map(s => `
          <div class="stat">
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="agent-body">
        <div class="section-title">${i === cards.length - 1 ? 'Actions for Tonight' : 'Key Points'}</div>
        ${card.accomplishments.map(a => `
          <div class="accomplishment">
            <span class="acc-icon">${a.icon}</span>
            <span class="acc-text">${a.text}</span>
          </div>
        `).join('')}
        ${card.keyFinding ? `
          <div class="key-finding ${card.keyFinding.type === 'warning' ? 'warning' : ''} ${card.keyFinding.type === 'info' ? 'info' : ''}">
            <div class="key-finding-label">${card.keyFinding.label}</div>
            <div class="key-finding-text">${card.keyFinding.text}</div>
          </div>
        ` : ''}
      </div>
      <div class="agent-footer">
        <div class="status-dot" style="background:${card.status.color}"></div>
        <span class="status-text">${card.status.text}</span>
      </div>
    </div>`;
  });

  container.innerHTML = html;

  // Dots
  dotsContainer.innerHTML = cards.map((_, i) =>
    `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`
  ).join('');

  // Scroll listener for dots
  container.addEventListener('scroll', () => {
    const cardWidth = container.firstElementChild.offsetWidth + 12;
    const activeIndex = Math.round(container.scrollLeft / cardWidth);
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === activeIndex);
    });
  });
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40">
  <defs>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <radialGradient id="orbInner" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(99,102,241,0)"/>
    </radialGradient>
  </defs>
  <!-- Scout Orb -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="url(#orbGrad)" stroke-width="2" opacity="0.9"/>
  <circle cx="20" cy="20" r="12" fill="url(#orbGrad)" opacity="0.12"/>
  <circle cx="20" cy="20" r="12" fill="url(#orbInner)"/>
  <!-- Neural dots inside orb -->
  <circle cx="15" cy="16" r="1.2" fill="#93c5fd" opacity="0.8"/>
  <circle cx="24" cy="14" r="1" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="20" cy="22" r="1.3" fill="#93c5fd" opacity="0.6"/>
  <circle cx="17" cy="25" r="0.8" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="25" cy="23" r="1" fill="#93c5fd" opacity="0.7"/>
  <!-- Neural connections -->
  <line x1="15" y1="16" x2="24" y2="14" stroke="#93c5fd" stroke-width="0.4" opacity="0.3"/>
  <line x1="15" y1="16" x2="20" y2="22" stroke="#93c5fd" stroke-width="0.4" opacity="0.3"/>
  <line x1="24" y1="14" x2="25" y2="23" stroke="#a5b4fc" stroke-width="0.4" opacity="0.3"/>
  <line x1="20" y1="22" x2="25" y2="23" stroke="#93c5fd" stroke-width="0.4" opacity="0.3"/>
  <!-- iEnable text -->
  <text x="44" y="27" font-family="serif" font-size="22" font-weight="400" fill="white" letter-spacing="-0.5">iEnable</text>
</svg>

// ─── API Configuration ───

// ─── API Client ───
async function apiGet(path) {
  try {
    const res = await fetch(`${API_BASE}${path}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('API GET error:', path, err);
    return null;
  }
}

async function apiPost(path, body) {
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('API POST error:', path, err);
    return null;
  }
}

// ─── Data Transformer (Backend → Frontend) ───
function transformBackendFlow(backendFlow) {
  // Backend has: { id, name, description, nodes[], edges[], ... }
  // Frontend needs: { flowName, proposedBy, timestamp, phases[], ... }
  
  const flow = backendFlow.flow || backendFlow;
  const nodes = flow.nodes || [];
  const edges = flow.edges || [];
  
  // Group nodes into phases by type and flow order
  const phases = [];
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });
  
  // Build adjacency for flow order
  const nextNode = {};
  edges.forEach(e => { nextNode[e.source] = e.target; });
  
  // Type-to-emoji mapping
  const typeEmoji = {
    trigger: '🕐',
    action: '⚡',
    gate: '✅',
    qa: '🎯'
  };
  
  // Group sequential nodes of same type into phases
  let visited = new Set();
  let currentPhaseNodes = [];
  let currentPhaseType = null;
  let phaseId = 0;
  
  function flushPhase() {
    if (currentPhaseNodes.length === 0) return;
    
    const phaseLabel = currentPhaseType === 'trigger' ? 'Start' :
                       currentPhaseType === 'gate' ? 'Approval' :
                       currentPhaseType === 'qa' ? 'Quality Check' :
                       currentPhaseType === 'action' ? 'Execute' : 'Phase';
    
    const steps = currentPhaseNodes.map(n => ({
      label: n.label || 'Untitled Step',
      description: n.description || '',
      type: n.type || 'action',
      status: 'unchanged',
      icon: typeEmoji[n.type] || '📄',
      agent: n.config?.subtype === 'agent' ? {
        name: 'Agent',
        avatar: '🤖',
        color: '#3b82f6'
      } : undefined,
      model: n.config?.model,
      approver: n.config?.assignee,
      mode: n.config?.mode === 'human' ? '👤 Human review' : undefined,
      criteria: n.config?.criteria
    }));
    
    phases.push({
      id: `phase-${phaseId++}`,
      emoji: typeEmoji[currentPhaseType] || '📋',
      label: phaseLabel,
      steps: steps
    });
    
    currentPhaseNodes = [];
  }
  
  // Traverse from first node
  let currentId = nodes[0]?.id;
  while (currentId && !visited.has(currentId)) {
    visited.add(currentId);
    const node = nodeMap[currentId];
    if (!node) break;
    
    // If type changes, flush current phase
    if (currentPhaseType && node.type !== currentPhaseType) {
      flushPhase();
      currentPhaseType = node.type;
    } else if (!currentPhaseType) {
      currentPhaseType = node.type;
    }
    
    currentPhaseNodes.push(node);
    currentId = nextNode[currentId];
  }
  
  // Flush final phase
  flushPhase();
  
  // Handle remaining unvisited nodes (shouldn't happen in well-formed flows)
  nodes.forEach(n => {
    if (!visited.has(n.id)) {
      phases.push({
        id: `phase-${phaseId++}`,
        emoji: typeEmoji[n.type] || '📋',
        label: 'Miscellaneous',
        steps: [{
          label: n.label || 'Untitled',
          description: n.description || '',
          type: n.type || 'action',
          status: 'unchanged',
          icon: typeEmoji[n.type] || '📄'
        }]
      });
    }
  });
  
  return {
    flowName: flow.name || 'Untitled Flow',
    proposedBy: flow.author || 'System',
    timestamp: flow.updated_at || flow.created_at || new Date().toISOString(),
    changeSummary: flow.description || '',
    changeReason: '',
    dependencies: [],
    phases: phases
  };
}

// ─── Helpers ───
function timeAgo(ts) {
const now = new Date();
const date = new Date(ts);
const diffMs = now - date;
const diffMin = Math.floor(diffMs / 60000);
if (diffMin < 1) return 'Just now';
if (diffMin < 60) return `${diffMin}m ago`;
const diffHr = Math.floor(diffMin / 60);
if (diffHr < 24) return `${diffHr}h ago`;
const diffDay = Math.floor(diffHr / 24);
if (diffDay === 1) return 'Yesterday';
if (diffDay < 7) return `${diffDay} days ago`;
return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function countChanges(phases) {
let newCount = 0, modCount = 0;
phases.forEach(p => { (p.steps || []).forEach(s => { if (s.status === 'new') newCount++; if (s.status === 'modified') modCount++; }); });
return { newCount, modCount };
}

function renderStep(step) {
const status = step.status || 'unchanged';
let badgeHtml = '';
if (status === 'new') badgeHtml = '<span class="step-badge new">✨ NEW</span>';
else if (status === 'modified') badgeHtml = '<span class="step-badge modified">✏️ MODIFIED</span>';
let metaHtml = '';
if (step.sources && step.sources.length > 0) { metaHtml += '<div class="step-meta">'; step.sources.forEach(s => { metaHtml += `<span class="meta-tag">${esc(s)}</span>`; }); metaHtml += '</div>'; }
if (step.model) metaHtml += `<div class="step-meta"><span class="meta-tag">🧠 ${esc(step.model)}</span></div>`;
if (step.type === 'gate' && step.approver) { metaHtml += `<div class="gate-info"><div class="gate-row">👤 <strong>${esc(step.approver)}</strong></div>${step.mode ? `<div class="gate-row">${esc(step.mode)}</div>` : ''}</div>`; }
if (step.criteria && step.criteria.length > 0) { metaHtml += '<div class="criteria-list">'; step.criteria.forEach(c => { metaHtml += `<span class="criteria-tag">${esc(c)}</span>`; }); metaHtml += '</div>'; }
if (step.agent) { metaHtml += `<div class="step-agent"><span class="step-agent-avatar" style="background:${step.agent.color || '#6b7280'}">${step.agent.avatar || step.agent.name.charAt(0)}</span><span class="step-agent-name">${esc(step.agent.name)}</span></div>`; }
if (step.keywords && step.keywords.length > 0) { metaHtml += '<div class="keywords-section"><div class="keywords-label">🎯 Targeting these keywords:</div><div class="criteria-list">'; step.keywords.forEach(k => { metaHtml += `<span class="keyword-tag">${esc(k)}</span>`; }); metaHtml += '</div></div>'; }
let changeNoteHtml = '';
if (step.changeNote) changeNoteHtml = `<div class="step-change-note">↳ ${esc(step.changeNote)}</div>`;
const loopClass = step.loopBack ? ' loopback' : step.optimizationLoop ? ' optimization-loop' : '';
return `<div class="step-card ${status}${loopClass}"><div class="step-top"><span class="step-icon">${step.icon || '📄'}</span><div class="step-info"><div class="step-label-row"><span class="step-label">${esc(step.label)}</span>${badgeHtml}</div><div class="step-desc">${esc(step.description)}</div>${changeNoteHtml}${metaHtml}</div></div></div>`;
}

// ─── Snake Flowchart Renderer ───
function renderSnake(flow) {
const container = document.getElementById('snake-content');
const allSteps = [];
flow.phases.forEach(phase => {
if (phase.steps && phase.steps.length > 0) {
phase.steps.forEach((step, i) => { allSteps.push({ ...step, phaseEmoji: phase.emoji, phaseLabel: phase.label, isFirstInPhase: i === 0 }); });
}
});
if (allSteps.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);">No steps to display</div>'; return; }
const NODES_PER_ROW = 2;
const rows = [];
for (let i = 0; i < allSteps.length; i += NODES_PER_ROW) { rows.push(allSteps.slice(i, i + NODES_PER_ROW)); }
let html = '<div class="snake-container">';
rows.forEach((row, rowIdx) => {
const isRTL = rowIdx % 2 === 1;
const orderedRow = isRTL ? [...row].reverse() : row;
const firstStepOriginal = row[0];
if (firstStepOriginal.isFirstInPhase) {
html += `<div class="snake-phase-label fade-in-up delay-${Math.min(rowIdx + 1, 10)}"><span class="snake-phase-emoji">${firstStepOriginal.phaseEmoji}</span> ${esc(firstStepOriginal.phaseLabel)}</div>`;
}
html += `<div class="snake-row ${isRTL ? 'rtl' : 'ltr'} fade-in-up delay-${Math.min(rowIdx + 2, 10)}">`;
orderedRow.forEach((step, ni) => {
if (ni > 0) html += `<div class="snake-arrow-h">${isRTL ? '←' : '→'}</div>`;
const typeClass = 'type-' + (step.type || 'action');
const statusClass = (step.status === 'new' || step.status === 'modified') ? 'status-' + step.status : '';
html += `<div class="snake-node ${typeClass} ${statusClass}">`;
if (step.agent) html += `<div class="snake-node-agent" style="background:${step.agent.color || '#6b7280'}">${step.agent.avatar || step.agent.name.charAt(0)}</div>`;
if (step.type === 'gate') {
const initial = (step.approver || '?').charAt(0).toUpperCase();
html += `<div class="gate-avatar">${initial}</div><div class="snake-node-label">${esc(step.label)}</div>`;
if (step.mode) html += `<div class="gate-mode">${esc(step.mode)}</div>`;
} else {
html += `<span class="snake-node-emoji">${step.icon || '📄'}</span><div class="snake-node-label">${esc(step.label)}</div>`;
}
if (step.status === 'new') html += '<div class="snake-node-badge new">✨ NEW</div>';
else if (step.status === 'modified') html += '<div class="snake-node-badge modified">✏️ MODIFIED</div>';
html += '</div>';
});
html += '</div>';
if (rowIdx < rows.length - 1) {
const turnClass = isRTL ? 'turn-left' : 'turn-right';
html += `<div class="snake-turn ${turnClass}"><div class="snake-turn-line"></div></div>`;
}
});
html += '</div>';
container.innerHTML = html;
}

// ─── Init ───
async function init() {
  // Try to load from backend first
  try {
    await initFlowSelector();
    const flowData = await loadFlowFromBackend(currentFlowId);
    window._flow = flowData;
    render(flowData);
  } catch (e) {
    console.error('Failed to load from backend, using DEMO_FLOW', e);
    window._flow = DEMO_FLOW;
    render(DEMO_FLOW);
  }
}
document.addEventListener('DOMContentLoaded', init);

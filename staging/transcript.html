<!DOCTYPE html>
<html>
<head>
  <title>Max AI Roleplay Transcript</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 40px 20px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.7;
      background: #0a0a0f;
      color: #e0e0e0;
    }
    h1 { color: #00d4ff; font-size: 2em; border-bottom: 2px solid #00d4ff; padding-bottom: 10px; }
    h2 { color: #00d4ff; margin-top: 40px; }
    h3 { color: #8b5cf6; }
    blockquote { 
      border-left: 4px solid #00d4ff; 
      padding-left: 20px; 
      margin: 20px 0;
      background: #111;
      padding: 15px 20px;
      border-radius: 0 8px 8px 0;
    }
    code { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
    pre { background: #1a1a2e; padding: 15px; border-radius: 8px; overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    th, td { border: 1px solid #333; padding: 12px; text-align: left; }
    th { background: #1a1a2e; color: #00d4ff; }
    strong { color: #fff; }
    hr { border: none; border-top: 1px solid #333; margin: 40px 0; }
    @media print {
      body { background: #fff; color: #000; }
      h1, h2, h3, th { color: #000; }
      blockquote { background: #f5f5f5; border-left-color: #333; }
    }
  </style>
</head>
<body>
  <div id="content">Loading...</div>
  <script>
    fetch('ROLEPLAY-TRANSCRIPT-2026-02-16.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      });
  </script>
</body>
</html>
